name: Bug Report
description: File a bug report to help us improve Nuncio
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thank you for taking the time to report a bug in Nuncio!
  - type: textarea
    id: summary
    attributes:
      label: Bug Description
      description: Clear and concise description of the bug.
    validations:
      required: true
  - type: dropdown
    id: interface
    attributes:
      label: Interface / Shell
      options:
        - CLI (nuncio-cli)
        - TUI (nuncio-tui)
        - GUI (nuncio-gui)
        - Core Engine (nuncio-core / mail / cal / store)
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Windows 11 / 10
        - Linux (x86_64)
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: Description of what you expected to happen.
    validations:
      required: true
