name: Nuncio Nightly & Snapshot Release Pipeline

on:
  push:
    branches:
      - dev
  schedule:
    - cron: '0 2 * * *' # Daily Nightly Build at 02:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build-nightly-binaries:
    name: Build Nightly Binaries (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: nuncio-nightly-x86_64-unknown-linux-gnu.tar.gz
          - os: macOS-latest
            target: aarch64-apple-darwin
            artifact_name: nuncio-nightly-aarch64-apple-darwin.tar.gz
          - os: macOS-13
            target: x86_64-apple-darwin
            artifact_name: nuncio-nightly-x86_64-apple-darwin.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: nuncio-nightly-x86_64-pc-windows-msvc.zip

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build Workspace Binaries (Release Mode)
        run: cargo build --workspace --release --target ${{ matrix.target }}

      - name: Package Linux / macOS Binaries (.tar.gz)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/nuncio-cli dist/nuncio-cli
          cp target/${{ matrix.target }}/release/nuncio-tui dist/nuncio-tui
          cp target/${{ matrix.target }}/release/nuncio-mcp dist/nuncio-mcp
          cp target/${{ matrix.target }}/release/nunciod dist/nunciod
          tar -czf ${{ matrix.artifact_name }} -C dist .

      - name: Package Windows Binaries (.zip)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist
          Copy-Item target/${{ matrix.target }}/release/nuncio-cli.exe dist/nuncio-cli.exe
          Copy-Item target/${{ matrix.target }}/release/nuncio-tui.exe dist/nuncio-tui.exe
          Copy-Item target/${{ matrix.target }}/release/nuncio-mcp.exe dist/nuncio-mcp.exe
          Copy-Item target/${{ matrix.target }}/release/nunciod.exe dist/nunciod.exe
          Compress-Archive -Path dist/* -DestinationPath ${{ matrix.artifact_name }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ${{ matrix.artifact_name }}

  publish-nightly-release:
    name: Publish GitHub Nightly Pre-Release
    needs: build-nightly-binaries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Download All Target Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Move Release Files to Root
        run: |
          mkdir -p dist-final
          find release-artifacts -type f -exec cp {} dist-final/ \;
          cd dist-final
          sha256sum * > SHA256SUMS.txt

      - name: Create or Update GitHub Nightly Pre-Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: dev-nightly
          name: Nuncio Development Nightly Snapshot
          prerelease: true
          files: dist-final/*
          body: |
            ## Nuncio Development Nightly Snapshot
            **Channel**: Development / Bleeding-Edge (`dev` branch)

            This pre-release contains automated daily development snapshots compiled directly from the `dev` branch.

            ### 📦 Nightly Artifact Downloads
            - **Windows Snapshot**: `nuncio-nightly-x86_64-pc-windows-msvc.zip`
            - **macOS Apple Silicon Snapshot**: `nuncio-nightly-aarch64-apple-darwin.tar.gz`
            - **macOS Intel Snapshot**: `nuncio-nightly-x86_64-apple-darwin.tar.gz`
            - **Linux Snapshot**: `nuncio-nightly-x86_64-unknown-linux-gnu.tar.gz`

            Verify payload hashes against `SHA256SUMS.txt`.
