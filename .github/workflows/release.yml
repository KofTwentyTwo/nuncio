name: Nuncio Multi-Platform Release & Nightly Pipeline

on:
  push:
    tags:
      - 'v*'
  schedule:
    - cron: '0 0 * * *' # Daily Nightly Build at 00:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build-binaries:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: nuncio-x86_64-unknown-linux-gnu.tar.gz
          - os: macOS-latest
            target: aarch64-apple-darwin
            artifact_name: nuncio-aarch64-apple-darwin.tar.gz
          - os: macOS-13
            target: x86_64-apple-darwin
            artifact_name: nuncio-x86_64-apple-darwin.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: nuncio-x86_64-pc-windows-msvc.zip

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build Production Workspace Binaries
        run: cargo build --workspace --release --target ${{ matrix.target }}

      - name: Package Linux / macOS Binaries (.tar.gz)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/nuncio-cli dist/nuncio-cli
          cp target/${{ matrix.target }}/release/nuncio-tui dist/nuncio-tui
          cp target/${{ matrix.target }}/release/nuncio-mcp dist/nuncio-mcp
          cp target/${{ matrix.target }}/release/nunciod dist/nunciod
          tar -czf ${{ matrix.artifact_name }} -C dist .

      - name: Package Windows Binaries (.zip)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist
          Copy-Item target/${{ matrix.target }}/release/nuncio-cli.exe dist/nuncio-cli.exe
          Copy-Item target/${{ matrix.target }}/release/nuncio-tui.exe dist/nuncio-tui.exe
          Copy-Item target/${{ matrix.target }}/release/nuncio-mcp.exe dist/nuncio-mcp.exe
          Copy-Item target/${{ matrix.target }}/release/nunciod.exe dist/nunciod.exe
          Compress-Archive -Path dist/* -DestinationPath ${{ matrix.artifact_name }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ${{ matrix.artifact_name }}

  publish-release:
    name: Publish GitHub Release / Nightly Pre-Release
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Download All Target Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Move Release Files to Root
        run: |
          mkdir -p dist-final
          find release-artifacts -type f -exec cp {} dist-final/ \;
          cd dist-final
          sha256sum * > SHA256SUMS.txt

      - name: Determine Tag & Release Name
        id: prep
        run: |
          if [[ "${{ github.event_name }}" == "schedule" || "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag_name=nightly-$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
            echo "release_name=Nuncio Development Nightly ($(date +'%Y-%m-%d'))" >> $GITHUB_OUTPUT
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "tag_name=${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "release_name=Nuncio Release ${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.prep.outputs.tag_name }}
          name: ${{ steps.prep.outputs.release_name }}
          prerelease: ${{ steps.prep.outputs.is_prerelease }}
          files: dist-final/*
          body: |
            ## Nuncio Sovereign Mail, Calendar & Contacts Suite

            ### 📦 Official Installer & Package Downloads
            - **Windows Installer**: `Nuncio_x64.msi` (WiX Installer) / `Nuncio_x64-setup.exe` (NSIS)
            - **macOS Disk Image**: `Nuncio_x64.dmg` (Intel) / `Nuncio_aarch64.dmg` (Apple Silicon)
            - **Linux Packages**: `Nuncio_amd64.AppImage` / `Nuncio_amd64.deb`
            - **CLI & Daemon Archives**: `nuncio-x86_64-unknown-linux-gnu.tar.gz`, `nuncio-aarch64-apple-darwin.tar.gz`, `nuncio-x86_64-apple-darwin.tar.gz`, `nuncio-x86_64-pc-windows-msvc.zip`

            ### 🚀 Package Managers
            - **Homebrew Tap**: `brew install koftwentytwo/tap/nuncio`
            - **Cargo Source**: `cargo install --git https://github.com/KofTwentyTwo/nuncio.git nuncio-cli nuncio-tui nuncio-mcp nunciod`

            Verify payload hashes against `SHA256SUMS.txt`.
