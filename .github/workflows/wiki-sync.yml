name: Sync Docs to GitHub Wiki

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'assets/**'
      - '.github/workflows/wiki-sync.yml'
  workflow_dispatch:

jobs:
  sync-wiki:
    name: Sync docs/ to GitHub Wiki
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Main Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout Wiki Repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}.wiki
          token: ${{ secrets.GITHUB_TOKEN }}
          path: wiki-repo

      - name: Sync docs and assets to Wiki
        run: |
          mkdir -p wiki-repo/assets
          cp -r docs/* wiki-repo/ 2>/dev/null || true
          cp -r assets/* wiki-repo/assets/ 2>/dev/null || true
          cd wiki-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --staged --quiet; then
            echo "No changes to commit to Wiki."
          else
            git commit -m "docs(wiki): automated sync from docs/ master [skip ci]"
            git push origin master
          fi
